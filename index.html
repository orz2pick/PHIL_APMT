 <!DOCTYPE html>

            padding: 0;

        }

        }

        }

        header {

            padding: 60px 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            margin-bottom: 40px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 15px;
            background: linear-gradient(90deg, #e94560, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #a0a0a0;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .author {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(233, 69, 96, 0.15);
            padding: 10px 25px;
            border-radius: 50px;

        .author::before {
            content: "📺";

        .intro {
            background: rgba(255,255,255,0.05);
            padding: 30px;

            margin-bottom: 15px;

            font-size: 0.9rem;
            color: #a0a0a0;
        }

        .progress-fill {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill-inner {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            border-radius: 3px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .question-card {
            background: rgba(255,255,255,0.04);
            border-radius: 20px;
            padding: 35px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.06);
            transition: all 0.3s ease;
        }

        .question-card:hover {
            border-color: rgba(233, 69, 96, 0.3);
            transform: translateY(-2px);
        }

        .question-card.answered {
            border-color: rgba(76, 175, 80, 0.4);
            background: rgba(76, 175, 80, 0.05);
        }

        .question-number {
            display: inline-block;
            background: #e94560;
            color: white;
            width: 40px;
            height: 40px;
            line-height: 40px;
            text-align: center;
            border-radius: 50%;
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .question-card.answered .question-number {
            background: #4caf50;
        }

        .question-text {
            font-size: 1.25rem;
            margin-bottom: 25px;
            color: #fff;
            font-weight: 500;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            position: relative;
        }

        .option input {
            position: absolute;
            opacity: 0;
        }

        .option label {
            display: block;
            padding: 18px 22px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 2px solid transparent;
            padding-left: 55px;
        }

        .option label::before {
            content: "";
            position: absolute;
            left: 22px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            transition: all 0.25s ease;
        }

        .option input:checked + label {
            background: rgba(233, 69, 96, 0.15);
            border-color: #e94560;
        }

        .option input:checked + label::before {
            background: #e94560;
            border-color: #e94560;
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }

        .option label:hover {
            background: rgba(255,255,255,0.08);
        }

        .category-label {
            display: inline-block;
            background: rgba(233, 69, 96, 0.2);
            color: #e94560;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn {
            display: block;
            width: 100%;
            padding: 22px;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 40px;
            font-family: inherit;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(233, 69, 96, 0.4);
        }

        .submit-btn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 结果页面 */
        .result-section {
            display: none;
            animation: fadeIn 0.8s ease;

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }

            background: rgba(255,255,255,0.05);

            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);

            border-radius: 15px;

            font-weight: bold;
            color: #e94560;

        .result-code-sub {
            font-size: 0.9rem;
            color: #a0a0a0;
            margin-top: 5px;
        }

        .result-type {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: #fff;
        }

        .result-title {
            font-size: 1.3rem;
            color: #e94560;
            margin-bottom: 25px;

            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto 40px;

            margin: 40px 0;
            text-align: left;

            align-items: center;
            gap: 15px;

        .dim-label {

            font-size: 0.9rem;
            color: #a0a0a0;

            height: 35px;

            border-radius: 8px;
            overflow: hidden;
            position: relative;

            height: 100%;

            justify-content: flex-end;
            padding-right: 12px;

        .dim-fill.b { background: linear-gradient(90deg, #00d9ff, #00a8e8); }

            margin-bottom: 20px;

            margin-top: 30px;

        .type-comparison h3 {

            margin-bottom: 20px;

            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            opacity: 0.5;
            transition: all 0.3s ease;

        .type-item.active {
            opacity: 1;
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .type-item.logi.active { background: rgba(233, 69, 96, 0.2); border: 1px solid #e94560; }
        .type-item.doer.active { background: rgba(0, 217, 255, 0.2); border: 1px solid #00d9ff; }
        .type-item.hugs.active { background: rgba(254, 202, 87, 0.2); border: 1px solid #feca57; }
        .type-item.tran.active { background: rgba(95, 39, 205, 0.2); border: 1px solid #5f27cd; }

        .type-code {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .type-item.logi .type-code { color: #e94560; }
        .type-item.doer .type-code { color: #00d9ff; }
        .type-item.hugs .type-code { color: #feca57; }
        .type-item.tran .type-code { color: #a78bfa; }

        .type-name {
            font-size: 0.85rem;
            color: #c0c0c0;
        }

        .restart-btn {
            display: inline-block;
            margin-top: 40px;
            padding: 18px 45px;
            background: transparent;
            color: #e94560;
            border: 2px solid #e94560;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .restart-btn:hover {
            background: #e94560;
            color: white;
        }

        footer {
            text-align: center;
            padding: 60px 20px 40px;
            color: #666;
            font-size: 0.9rem;
        }

        footer a {
            color: #e94560;
            text-decoration: none;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .question-card { padding: 25px; }
            .result-code-main { font-size: 3rem; }
            .result-type { font-size: 1.8rem; }
            .type-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>哲学人格测试</h1>
            <p class="subtitle">20题探索你的思想底色 · 发现你的哲学倾向</p>

        // 记录已回答的问题
        let answeredQuestions = new Set();

        function renderQuestions() {
            const form = document.getElementById('quiz-form');
            questions.forEach((q, i) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `card-${i}`;
                card.innerHTML = `
                    <span class="category-label">${q.category}</span>
                    <div class="question-number">${i + 1}</div>
                    <div class="question-text">${q.text}</div>
                    <div class="options">
                        ${q.options.map((opt, j) => `
                            <div class="option">
                                <input type="radio" name="q${i}" id="q${i}_${j}" value="${String.fromCharCode(65 + j)}" onchange="handleAnswer(${i})">
                                <label for="q${i}_${j}">${opt}</label>
                            </div>
                        `).join('')}
                    </div>
                `;
                form.appendChild(card);
            });

            const submitBtn = document.createElement('button');
            submitBtn.type = 'button';
            submitBtn.className = 'submit-btn';
            submitBtn.id = 'submit-btn';
            submitBtn.textContent = '查看我的哲学人格';
            submitBtn.onclick = calculateResult;
            submitBtn.disabled = true;
            form.appendChild(submitBtn);
        }

        function handleAnswer(questionIndex) {
            // 标记该题已回答
            answeredQuestions.add(questionIndex);
            
            // 添加已回答样式
            const card = document.getElementById(`card-${questionIndex}`);
            card.classList.add('answered');
            
            // 更新进度
            updateProgress();
        }

        function updateProgress() {
            const answered = answeredQuestions.size;
            const percent = (answered / 20) * 100;
            
            document.getElementById('progress-num').textContent = `${answered}/20`;
            document.getElementById('progress-bar').style.width = `${percent}%`;
            
            document.getElementById('submit-btn').disabled = answered < 20;
        }

        function calculateResult() {
            const form = document.getElementById('quiz-form');
            const formData = new FormData(form);
            const counts = { A: 0, B: 0, C: 0, D: 0 };
            
            // 遍历所有问题，统计答案
            for (let i = 0; i < 20; i++) {
                const value = formData.get(`q${i}`);
                if (value && counts.hasOwnProperty(value)) {
                    counts[value]++;
                }
            }

            const maxType = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
            const result = resultTypes[maxType];

            // 计算各维度百分比
            const total = 20;
            const percentages = {
                A: Math.round((counts.A / total) * 100),
                B: Math.round((counts.B / total) * 100),
                C: Math.round((counts.C / total) * 100),
                D: Math.round((counts.D / total) * 100)
            };

            document.getElementById('quiz-form').style.display = 'none';
            document.querySelector('.progress-bar').style.display = 'none';
            
            const resultSection = document.getElementById('result');
            resultSection.style.display = 'block';
            resultSection.innerHTML = `
                <div class="result-card">
                    <div class="result-code">
                        <div class="result-code-main">${result.code}</div>
                        <div class="result-code-sub">${result.fullname}</div>
                    </div>
                    
                    <div class="result-type">${result.name}</div>
                    <div class="result-title">${result.title}</div>
                    
                    <div class="result-motto">"${result.motto}"</div>
                    
                    <div class="result-desc">${result.desc}</div>
                    
                    <div class="dimension-bars">
                        <div class="dimension">
                            <span class="dim-label">LOGI</span>
                            <div class="dim-bar"><div class="dim-fill a" style="width: ${percentages.A}%">${percentages.A}%</div></div>
                        </div>
                        <div class="dimension">
                            <span class="dim-label">DOER</span>
                            <div class="dim-bar"><div class="dim-fill b" style="width: ${percentages.B}%">${percentages.B}%</div></div>
                        </div>
                        <div class="dimension">
                            <span class="dim-label">HUGS</span>
                            <div class="dim-bar"><div class="dim-fill c" style="width: ${percentages.C}%">${percentages.C}%</div></div>
                        </div>
                        <div class="dimension">
                            <span class="dim-label">TRAN</span>
                            <div class="dim-bar"><div class="dim-fill d" style="width: ${percentages.D}%">${percentages.D}%</div></div>
                        </div>
                    </div>

                    <div class="philosopher-match">
                        <h3>🎓 与你气质相近的思想家</h3>
                        <div class="philosopher-list">
                            ${result.philosophers.map(p => `<span class="philosopher-tag">${p}</span>`).join('')}
                        </div>
                    </div>

                    <div class="type-comparison">
                        <h3>四种哲学人格类型</h3>
                        <div class="type-grid">
                            <div class="type-item logi ${maxType === 'A' ? 'active' : ''}">
                                <div class="type-code">LOGI</div>
                                <div class="type-name">理性主义</div>
                            </div>
                            <div class="type-item doer ${maxType === 'B' ? 'active' : ''}">
                                <div class="type-code">DOER</div>
                                <div class="type-name">实践主义</div>
                            </div>
                            <div class="type-item hugs ${maxType === 'C' ? 'active' : ''}">
                                <div class="type-code">HUGS</div>
                                <div class="type-name">社群主义</div>
                            </div>
                            <div class="type-item tran ${maxType === 'D' ? 'active' : ''}">
                                <div class="type-code">TRAN</div>
                                <div class="type-name">超越主义</div>
                            </div>
                        </div>
                    </div>

                    <button class="restart-btn" onclick="location.reload()">重新测试</button>
                </div>
            `;
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        renderQuestions();
    </script>
</body>
</html>
